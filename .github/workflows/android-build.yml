name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Web Assets
        run: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        run: |
          cd frontend
          npx cap sync android

      - name: Build Android APK
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK File
        run: |
          mv frontend/android/app/build/outputs/apk/debug/app-debug.apk frontend/android/app/build/outputs/apk/debug/AetherWealth.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherWealth-apk
          path: frontend/android/app/build/outputs/apk/debug/AetherWealth.apk
          if-no-files-found: error
          retention-days: 7

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "frontend/android/app/build/outputs/apk/debug/AetherWealth.apk"
          tag: "latest"
          name: "Latest Mobile Build"
          body: "This release contains the automatically built mobile app (`AetherWealth.apk`) from the latest commit."
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
