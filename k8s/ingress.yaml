apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wealth-tracker-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  - host: wealthtracker.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
