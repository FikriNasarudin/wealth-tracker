apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/fikrinasarudin/wealth-tracker-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MYSQL_DATABASE
          value: wealth_tracker
        - name: MYSQL_USER
          value: wt_user
        - name: MYSQL_PASSWORD
          value: wt_password
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: SECRET_KEY
          value: "your_super_secret_key_change_me"
        - name: DEBUG
          value: "False"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: backend
