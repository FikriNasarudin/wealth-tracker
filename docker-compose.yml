version: '3.8'

services:
  db_wealth_tracker:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: 'wealth_tracker'
      MYSQL_USER: 'wt_user'
      MYSQL_PASSWORD: 'wt_password'
      MYSQL_ROOT_PASSWORD: 'root_password'
    volumes:
      - db_data_wealth_tracker:/var/lib/mysql

  backend_wealth_tracker:
    # To use pre-built image instead of building locally, uncomment the line below and comment 'build':
    # image: ghcr.io/fikrinasarudin/wealth-tracker-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - MYSQL_DATABASE=wealth_tracker
      - MYSQL_USER=wt_user
      - MYSQL_PASSWORD=wt_password
      - DB_HOST=db_wealth_tracker
      - DB_PORT=3306
      - SECRET_KEY=your_super_secret_key_change_me
      - DEBUG=False
      # Optional: Enable Google Login by providing your Client ID
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      - db_wealth_tracker
    # We expose 8000 but it's only needed internally by the frontend nginx proxy
    # ports:
    #   - "8000:8000"

  frontend_wealth_tracker:
    # To use pre-built image instead of building locally, uncomment the line below and comment 'build':
    # image: ghcr.io/fikrinasarudin/wealth-tracker-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Optional: Enable Google Login on the frontend
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend_wealth_tracker

volumes:
  db_data_wealth_tracker:
